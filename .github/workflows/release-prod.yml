name: Release Prod

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0

      - name: Set release variables
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"

          if [[ "$TAG_NAME" =~ ^(.+)-(v.+)$ ]]; then
            echo "RELEASE_SERVICE=${BASH_REMATCH[1]}" >> $GITHUB_ENV
            echo "RELEASE_TAG=${BASH_REMATCH[2]}" >> $GITHUB_ENV
          else
            echo "Invalid release tag format: $TAG_NAME"
            echo "Expected format: service-name-v1.1.0"
            exit 1
          fi

          echo "SHA_TAG=sha-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Release service
        run: |
          SERVICE="${RELEASE_SERVICE}"

          echo "Releasing $SERVICE"

          docker pull ghcr.io/printnow-dev/${SERVICE}:${SHA_TAG}

          docker tag \
            ghcr.io/printnow-dev/${SERVICE}:${SHA_TAG} \
            ghcr.io/printnow-dev/${SERVICE}:${RELEASE_TAG}

          docker push ghcr.io/printnow-dev/${SERVICE}:${RELEASE_TAG}

          yq -i ".image.tag = \"${RELEASE_TAG}\"" \
            helm/services/${SERVICE}/values-prod.yaml

      - name: Commit & push Helm updates
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@bot.com"

          git add helm/services/${RELEASE_SERVICE}/values-prod.yaml
          git commit -m "release ${RELEASE_SERVICE} -> ${RELEASE_TAG}" || echo "No changes"
          git push

      - name: Notify
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "CI/CD Bot <${{ secrets.SMTP_USER }}>"
          subject: "Prod Release - ${{ job.status }}"
          body: |
            Release: ${{ github.event.release.tag_name }}
            Service: ${{ env.RELEASE_SERVICE }}
            Status: ${{ job.status }}

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
