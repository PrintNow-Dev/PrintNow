name: Frontend CI/CD

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      image:
        required: true
        type: string
      trigger:
        required: true
        type: string

  push:
    branches:
      - dev
    paths:
      - 'helm/services/frontend/values-dev.yaml'

permissions:
  contents: read
  packages: write

jobs:

  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm test -- --coverage || true
      - run: npm run build

      - uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}

      - uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Notify
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} [${{ inputs.service }}] PR — ${{ github.sha }}"
          body: "Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Generate image tag dynamically
      - id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=sha-$SHA" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/printnow-dev/${{ inputs.service }}:sha-$SHA" >> $GITHUB_OUTPUT

      # Detect frontend folder
      - id: context
        shell: bash
        run: |
          if [ -d "./frontend" ]; then
            echo "path=./frontend" >> "$GITHUB_OUTPUT"
          else
            echo "path=." >> "$GITHUB_OUTPUT"
          fi

      # Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build locally (for scanning)
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.path }}
          load: true
          tags: ${{ steps.meta.outputs.image }}

      # Security scan
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          severity: CRITICAL,HIGH
          exit-code: 1

      # Push image
      - name: Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.image }}

      # Trigger main repo (CD)
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          repository: YOUR_ORG/main-project-repo
          event-type: service-image-updated
          client-payload: |
            {
              "service_name": "${{ inputs.service }}",
              "image": "${{ steps.meta.outputs.image }}",
              "sha_tag": "${{ steps.meta.outputs.tag }}"
            }

      - name: Notify
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} [${{ inputs.service }}] Build"
          body: "Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"