name: Frontend CI/CD

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      image:
        required: true
        type: string
      trigger:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:

  pr-checks:
    if: inputs.trigger == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test -- --coverage || true
      - run: npm run build

      - name: Sonar
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}

      - name: Snyk
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Notify
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "CI/CD Bot <${{ secrets.SMTP_USER }}>"
          subject: "${{ job.status == 'success' && '✅' || '❌' }} [${{ inputs.service }}] PR Checks — ${{ github.sha }}"
          body: |
            STATUS: ${{ job.status }}
            Service: ${{ inputs.service }}
            Repo: ${{ github.repository }}
            Actor: ${{ github.actor }}
            Event: PR
            Commit: ${{ github.sha }}

            Steps:
            - Build
            - Sonar
            - Snyk

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build:
    if: inputs.trigger == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Detect frontend folder
      - id: context
        shell: bash
        run: |
          if [ -d "./frontend" ]; then
            echo "path=./frontend" >> "$GITHUB_OUTPUT"
          else
            echo "path=." >> "$GITHUB_OUTPUT"
          fi

      # Generate image tag (USE input image like backend)
      - id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=sha-$SHA" >> $GITHUB_OUTPUT
          echo "image=${{ inputs.image }}:sha-$SHA" >> $GITHUB_OUTPUT

      # Login GHCR
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build locally
      - uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.path }}
          load: true
          tags: ${{ steps.meta.outputs.image }}

      # Trivy scan
      - name: Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          severity: HIGH,CRITICAL
          exit-code: 1

      # Push image
      - uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.image }}

      # Dispatch to main repo
      - name: Dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          repository: printnow-dev/printnow
          event-type: service-image-updated
          client-payload: |
            {
              "service_name": "${{ inputs.service }}",
              "image": "${{ steps.meta.outputs.image }}",
              "sha_tag": "${{ steps.meta.outputs.tag }}",
              "commit_sha": "${{ github.sha }}"
            }

      - name: Notify
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "CI/CD Bot <${{ secrets.SMTP_USER }}>"
          subject: "${{ job.status == 'success' && '✅' || '❌' }} [${{ inputs.service }}] Build — ${{ steps.meta.outputs.tag }}"
          body: |
            STATUS: ${{ job.status }}
            Service: ${{ inputs.service }}
            Image: ${{ steps.meta.outputs.image }}
            Commit: ${{ github.sha }}

            Steps:
            - Build
            - Trivy Scan
            - Push
            - Dispatch

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}