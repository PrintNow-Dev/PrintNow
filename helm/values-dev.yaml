printnow-common:
  targetNamespace: dev
  storageClass:
    name: printnow-sc
    server: 10.0.1.140
    share: /var/nfs/general/printnow
  mongodb:
    image: mongo:7.0.12
    storage: 10Gi
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  gateway:
    className: kgateway
    listenerPort: 80

user-service:
  namespace: dev
  replicaCount: 1
  image:
    repository: ghcr.io/printnow-dev/user-service
    tag: sha-e4fc033
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 5001
    targetPort: 5001
  config:
    PORT: "5001"
    NODE_ENV: development
    MONGO_URI: mongodb://mongodb-0.mongodb.dev.svc.cluster.local:27017/printnow
    USERS_COLLECTION: users
    JWT_EXPIRES_IN: 1d
  secret:
    JWT_SECRET: dev-printnow-jwt-secret-2026
    RAZORPAY_KEY_ID: rzp_dev_printnow_user
    RAZORPAY_SECRET: dev-printnow-user-razorpay-secret
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi

document-service:
  namespace: dev
  replicaCount: 1
  image:
    repository: ghcr.io/printnow-dev/printnow-document-service
    tag: sha-3e1873c
  service:
    type: ClusterIP
    port: 5002
    targetPort: 5002
  config:
    PORT: "5002"
    NODE_ENV: development
    MONGO_URI: mongodb://mongodb-0.mongodb.dev.svc.cluster.local:27017/printnow
    DOCUMENTS_COLLECTION: documents
    UPLOAD_DIR: uploads
    MAX_UPLOAD_MB: "25"
  secret:
    JWT_SECRET: dev-printnow-jwt-secret-2026
    RAZORPAY_KEY_ID: rzp_dev_printnow_document
    RAZORPAY_SECRET: dev-printnow-document-razorpay-secret
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi

