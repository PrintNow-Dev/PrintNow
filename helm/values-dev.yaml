vendor-service:
  namespace: dev
  replicaCount: 1
  image:
    repository: ghcr.io/printnow-dev/printnow-vendor-service
    tag: v1.1.0
  service:
    type: ClusterIP
    port: 5004
    targetPort: 5004
  config:
