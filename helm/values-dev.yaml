  namespace: dev
  replicaCount: 1
  image:
    repository: ghcr.io/printnow-dev/printnow-order-service
    tag: sha-3f7fdc3
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 5003
    targetPort: 5003
  config:
    PORT: "5003"
    NODE_ENV: development
    MONGO_URI: mongodb://mongodb-0.mongodb.dev.svc.cluster.local:27017/printnow
