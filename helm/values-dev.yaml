  secret:
    JWT_SECRET: dev-printnow-jwt-secret-2026
    RAZORPAY_KEY_ID: rzp_test_SgxwwTh05ycq20
    RAZORPAY_SECRET: ib19bXnXUxULKn56i0kv7HsQ
  resources:
    requests:
      cpu: 150m
