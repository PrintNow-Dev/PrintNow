printnow-common:
  targetNamespace: prod
  storageClass:
    name: printnow-sc
    server: 10.0.1.140
    share: /var/nfs/general/printnow
  mongodb:
    image: mongo:7.0.12
    storage: 20Gi
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
  gateway:
    className: kgateway
    listenerPort: 80

user-service:
  namespace: prod
  replicaCount: 2
  image:
    repository: ghcr.io/printnow-dev/user-service
    tag: v1.1.1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5001
    targetPort: 5001
  config:
    PORT: "5001"
    NODE_ENV: production
    MONGO_URI: mongodb://mongodb-0.mongodb.prod.svc.cluster.local:27017/printnow
    USERS_COLLECTION: users
    JWT_EXPIRES_IN: 12h
  secret:
    JWT_SECRET: prod-printnow-jwt-secret-2026
    RAZORPAY_KEY_ID: rzp_prod_printnow_user
    RAZORPAY_SECRET: prod-printnow-user-razorpay-secret
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 768Mi

document-service:
  namespace: prod
  replicaCount: 2
  image:
    repository: praveenx03/printnow-document-service
    tag: v1.1.0
  service:
    type: ClusterIP
    port: 5002
    targetPort: 5002
  config:
    PORT: "5002"
    NODE_ENV: production
    MONGO_URI: mongodb://mongodb-0.mongodb.prod.svc.cluster.local:27017/printnow
    DOCUMENTS_COLLECTION: documents
    UPLOAD_DIR: uploads
    MAX_UPLOAD_MB: "50"
  secret:
    JWT_SECRET: prod-printnow-jwt-secret-2026
    RAZORPAY_KEY_ID: rzp_prod_printnow_document
    RAZORPAY_SECRET: prod-printnow-document-razorpay-secret
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 768Mi

