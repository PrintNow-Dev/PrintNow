frontend:
  namespace: prod
  replicaCount: 2
  image:
    repository: praveenx03/printnow-frontend
    tag: v1.1.0
  service:
    type: NodePort
    port: 8080
    targetPort: 8080
  config:
    PORT: "8080"
    NODE_ENV: production
    API_BASE_PATH: /api
    DOCUMENT_BASE_PATH: /uploads
